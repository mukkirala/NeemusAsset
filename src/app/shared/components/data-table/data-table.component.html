<div class="dt-wrapper">

  <!-- ── Header Bar ───────────────────────────────────── -->
  <div class="dt-header">
    <div class="dt-header-left">
      <div class="dt-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3.375 19.5h17.25m-17.25 0a1.125 1.125 0 01-1.125-1.125M3.375 19.5h7.5c.621 0 1.125-.504 1.125-1.125m-9.75 0V5.625m0 12.75v-1.5c0-.621.504-1.125 1.125-1.125m18.375 2.625V5.625m0 12.75c0 .621-.504 1.125-1.125 1.125m1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125m0 3.75h-7.5A1.125 1.125 0 0112 18.375m9.75-12.75c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125m19.5 0v1.5c0 .621-.504 1.125-1.125 1.125M2.25 5.625v1.5c0 .621.504 1.125 1.125 1.125m0 0h17.25m-17.25 0h7.5c.621 0 1.125.504 1.125 1.125M3.375 8.25c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375z" />
        </svg>
      </div>
      <div>
        <h2 class="dt-title">{{ title }}</h2>
        <p class="dt-subtitle">{{ data.length | number }} records &bull; All features enabled</p>
      </div>
    </div>

    <div class="dt-header-badges">
      <span class="dt-badge badge-filter">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="12" height="12">
          <path fill-rule="evenodd" d="M2.628 1.601C5.028 1.206 7.49 1 10 1s4.973.206 7.372.601a.75.75 0 01.628.74v2.288a2.25 2.25 0 01-.659 1.59l-4.682 4.683a2.25 2.25 0 00-.659 1.59v3.037c0 .684-.31 1.33-.844 1.757l-1.937 1.55A.75.75 0 018 18.25v-5.757a2.25 2.25 0 00-.659-1.591L2.659 6.22A2.25 2.25 0 012 4.629V2.34a.75.75 0 01.628-.74z" clip-rule="evenodd" />
        </svg>
        Filter &amp; Sort
      </span>
      <span class="dt-badge badge-export">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="12" height="12">
          <path d="M10.75 2.75a.75.75 0 00-1.5 0v8.614L6.295 8.235a.75.75 0 10-1.09 1.03l4.25 4.5a.75.75 0 001.09 0l4.25-4.5a.75.75 0 00-1.09-1.03l-2.955 3.129V2.75z" />
          <path d="M3.5 12.75a.75.75 0 00-1.5 0v2.5A2.75 2.75 0 004.75 18h10.5A2.75 2.75 0 0018 15.25v-2.5a.75.75 0 00-1.5 0v2.5c0 .69-.56 1.25-1.25 1.25H4.75c-.69 0-1.25-.56-1.25-1.25v-2.5z" />
        </svg>
        Export
      </span>
      <span class="dt-badge badge-page">Paging</span>
    </div>
  </div>

  <!-- ── Syncfusion Grid ───────────────────────────────── -->
  <ejs-grid
    #grid
    id="customGrid"
    [dataSource]="data"
    [allowFiltering]="true"
    [allowSorting]="true"
    [allowPaging]="true"
    [allowGrouping]="allowGrouping"
    [allowResizing]="true"
    [allowReordering]="true"
    [allowExcelExport]="true"
    [allowPdfExport]="true"
    [showColumnChooser]="true"
    [showColumnMenu]="true"
    [filterSettings]="filterSettings"
    [sortSettings]="sortSettings"
    [pageSettings]="pageSettings"
    [groupSettings]="groupSettings"
    [selectionSettings]="selectionSettings"
    [editSettings]="editSettings"
    [toolbar]="toolbar"
    [height]="height"
    [enableHover]="true"
    [enableStickyHeader]="true"
    (toolbarClick)="toolbarClick($event)"
    gridLines="Horizontal"
  >
    <e-columns>
      <!-- Checkbox column for multi-select -->
      <e-column *ngIf="allowSelection" type="checkbox" width="50" [allowFiltering]="false" [allowSorting]="false"></e-column>

      <!-- Dynamic columns -->
      <e-column
        *ngFor="let col of columns"
        [field]="col.field"
        [headerText]="col.headerText"
        [width]="col.width"
        [format]="col.format || ''"
        [textAlign]="col.textAlign || 'Left'"
        [type]="col.type || 'string'"
        [isPrimaryKey]="col.isPrimaryKey || false"
        [allowFiltering]="col.allowFiltering !== false"
        [allowSorting]="col.allowSorting !== false"
        [clipMode]="col.clipMode || 'EllipsisWithTooltip'"
        [visible]="col.visible !== false"
      >
        <ng-template #template let-data>
          <ng-container *ngIf="col.field === 'qrImage'; else mapLink">
             <div class="flex items-center gap-2 p-1 border border-slate-200 rounded-lg bg-white shadow-sm w-fit">
                <div class="flex flex-col items-center justify-center pr-2 border-r border-slate-100">
                   <span class="text-[10px] font-black text-slate-900 tracking-tighter">NRL</span>
                </div>
                <div class="flex flex-col items-center">
                   <img *ngIf="data.qrImage; else qrGen" [src]="data.qrImage" class="w-10 h-10 object-contain" />
                   <ng-template #qrGen>
                      <div class="w-10 h-10 bg-slate-100 rounded flex items-center justify-center">
                         <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-slate-400">
                           <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 013.75 9.375v-4.5z" />
                         </svg>
                      </div>
                   </ng-template>
                   <span class="text-[8px] font-bold text-slate-600 mt-0.5">{{ data.mainAssetNumber }}</span>
                </div>
             </div>
          </ng-container>
          <ng-template #mapLink>
             <ng-container *ngIf="col.field === 'viewOnMap'; else defaultVal">
                <a href="javascript:void(0)" class="inline-flex items-center gap-1.5 text-sky-600 font-bold hover:text-sky-700 transition-colors">
                   <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
                      <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
                   </svg>
                   View on Map
                </a>
             </ng-container>
             <ng-container *ngIf="col.field === 'action'; else defaultVal">
                <a href="javascript:void(0)" class="text-sky-600 font-bold hover:underline">
                   {{ data[col.field] || 'View' }}
                </a>
             </ng-container>
          </ng-template>
          <ng-template #defaultVal>
            {{ data[col.field] }}
          </ng-template>
        </ng-template>
      </e-column>
    </e-columns>
  </ejs-grid>

</div>
