<!--Floating FAB Button -->
<button (click)="toggleChat()"
        class="fixed bottom-6 right-6 w-14 h-14 rounded-full bg-gradient-to-tr from-[var(--btn-gradient-start)] to-[var(--btn-gradient-end)] text-white shadow-lg shadow-sky-200 flex items-center justify-center transition-all duration-300 hover:scale-110 z-[100]"
        [class.rotate-90]="open">
  <mat-icon>{{ open ? 'close' : 'chat' }}</mat-icon>
  
  <span *ngIf="!open" class="absolute top-0 right-0 flex h-3 w-3">
    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-sky-400 opacity-75"></span>
    <span class="relative inline-flex rounded-full h-3 w-3 bg-sky-500"></span>
  </span>
</button>

<!-- 💬 Glassmorphism Chat Box -->
<div class="fixed bottom-24 right-6 w-[380px] max-w-[calc(100vw-48px)] h-[550px] max-h-[calc(100vh-140px)] bg-white/90 backdrop-blur-xl border border-gray-100 rounded-[32px] shadow-2xl flex flex-col overflow-hidden transition-all duration-500 transform z-[100]"
     [class.translate-y-0]="open"
     [class.opacity-100]="open"
     [class.translate-y-10]="!open"
     [class.opacity-0]="!open"
     [class.pointer-events-none]="!open">
  
  <!-- Premium Header -->
  <header class="p-6 bg-gradient-to-r from-sky-500 to-indigo-600 text-white relative overflow-hidden">
    <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-10 -mt-10 blur-2xl"></div>
    <div class="flex items-center justify-between relative z-10">
      <div class="flex items-center gap-3">
        <div class="relative">
          <div class="w-10 h-10 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center">
            <mat-icon class="text-white">smart_toy</mat-icon>
          </div>
          <span class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-400 border-2 border-sky-500 rounded-full"></span>
        </div>
        <div>
          <h3 class="font-bold text-lg">Neemus Assistant</h3>
          <div class="flex items-center gap-2 text-[10px] opacity-90">
            <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>
            <span>Online • Replies in seconds</span>
          </div>
        </div>
      </div>
      <button (click)="toggleChat()" class="p-2 hover:bg-white/10 rounded-lg transition-colors">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </header>

  <!-- Message Container -->
  <div class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar bg-gray-50/30">
    <!-- Welcome State -->
    <div *ngIf="messages.length === 0" class="flex flex-col items-center justify-center text-center py-8">
      <div class="w-16 h-16 bg-sky-50 rounded-2xl flex items-center justify-center mb-4 text-sky-500">
        <mat-icon class="text-3xl">smart_toy</mat-icon>
      </div>
      <div class="space-y-2">
        <p class="text-lg font-bold text-gray-900">Hello there! 👋</p>
        <p class="text-xs text-gray-500 max-w-[200px]">How can I help you today? Ask me about asset management or reports.</p>
      </div>
      <div class="flex flex-wrap justify-center gap-2 mt-6">
        <button *ngFor="let chip of ['Check Assets', 'Recent Reports', 'Support']"
                (click)="setQuickReply(chip)"
                class="px-4 py-2 bg-white border border-gray-100 rounded-xl text-xs font-bold text-gray-600 hover:border-sky-300 hover:text-sky-600 transition-all shadow-sm">
          {{ chip }}
        </button>
      </div>
    </div>

    <!-- Message List -->
    <div *ngFor="let msg of messages" 
         class="flex gap-3 animate-in fade-in slide-in-from-bottom-2 duration-300"
         [class.flex-row-reverse]="msg.sender === 'user'">
      <div class="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center text-xs shadow-sm"
           [class.bg-sky-100]="msg.sender === 'bot'"
           [class.text-sky-600]="msg.sender === 'bot'"
           [class.bg-gray-100]="msg.sender === 'user'"
           [class.text-gray-600]="msg.sender === 'user'">
        <mat-icon class="text-sm">{{ msg.sender === 'user' ? 'person' : 'smart_toy' }}</mat-icon>
      </div>
      <div class="max-w-[75%] space-y-1">
        <div class="p-3.5 rounded-[20px] text-sm shadow-sm"
             [class.rounded-tl-none]="msg.sender === 'bot'"
             [class.bg-white]="msg.sender === 'bot'"
             [class.text-gray-800]="msg.sender === 'bot'"
             [class.rounded-tr-none]="msg.sender === 'user'"
             [class.bg-sky-500]="msg.sender === 'user'"
             [class.text-white]="msg.sender === 'user'">
          {{ msg.text }}
        </div>
        <p class="text-[9px] text-gray-400 font-medium px-2" [class.text-right]="msg.sender === 'user'">
          {{ msg.timestamp }}
        </p>
      </div>
    </div>

    <!-- Typing Indicator -->
    <div *ngIf="isTyping" class="flex gap-3">
      <div class="w-8 h-8 rounded-full bg-sky-50 text-sky-500 flex-shrink-0 flex items-center justify-center">
        <mat-icon class="text-sm">smart_toy</mat-icon>
      </div>
      <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm flex items-center gap-1">
        <span class="w-1.5 h-1.5 bg-sky-400 rounded-full animate-bounce"></span>
        <span class="w-1.5 h-1.5 bg-sky-400 rounded-full animate-bounce [animation-delay:0.2s]"></span>
        <span class="w-1.5 h-1.5 bg-sky-400 rounded-full animate-bounce [animation-delay:0.4s]"></span>
      </div>
    </div>

    <div #chatEnd></div>
  </div>

  <!-- Input Bar -->
  <footer class="p-4 bg-white border-t border-gray-100">
    <div class="relative flex items-center">
      <input type="text" 
             [(ngModel)]="input" 
             (keydown.enter)="sendMessage()"
             placeholder="What's on your mind?..."
             class="w-full pl-4 pr-12 py-3.5 bg-gray-50 border-none rounded-2xl text-sm focus:ring-2 focus:ring-sky-500/20 outline-none transition-all placeholder:text-gray-400" />
      <button (click)="sendMessage()" 
              [disabled]="!input.trim()"
              class="absolute right-1.5 w-10 h-10 flex items-center justify-center rounded-xl transition-all disabled:text-gray-300"
              [class.bg-sky-500]="input.trim()"
              [class.text-white]="input.trim()"
              [class.shadow-lg]="input.trim()"
              [class.shadow-sky-200]="input.trim()">
        <mat-icon class="text-lg">send</mat-icon>
      </button>
    </div>
    <p class="text-center text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-4">Powered by Neemus AI</p>
  </footer>

</div>
