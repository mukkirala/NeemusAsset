<div class="card-container group">
  <div class="glass-card">
    <!-- Header Section -->
    <div class="card-header">
      <div class="icon-wrapper">
        <div class="icon-bg"></div>
        <mat-icon class="header-icon">{{icon}}</mat-icon>
      </div>
      <div class="header-text">
        <h2 class="card-title">{{title}}</h2>
        <p class="card-subtitle">{{subtitle}}</p>
      </div>
    </div>

    <!-- Content Section -->
    <div class="card-body">
      <ng-content></ng-content>
    </div>

    <!-- Footer Actions -->
    <div class="card-footer">
      <button mat-ripple class="action-button" 
              [disabled]="disabled"
              [class.opacity-50]="disabled"
              [class.cursor-not-allowed]="disabled"
              (click)="handleAction()">
        <span class="button-label">{{buttonLabel}}</span>
        <div class="button-icon-wrapper">
          <mat-icon class="button-icon">{{icon}}</mat-icon>
        </div>
        <div class="button-glow" *ngIf="!disabled"></div>
      </button>
    </div>

    <!-- Decorative Elements -->
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>
    <div class="border-shimmer"></div>
  </div>
</div>
