<nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-4 sm:px-6 py-2">
  <div class="max-w-screen-2xl mx-auto flex items-center justify-between">
    
    <!-- Left Section: Logo & Branding -->
    <div class="flex items-center gap-4">
      <button class="lg:hidden p-2 hover:bg-gray-50 rounded-xl transition-colors" (click)="onToggleSidebar()">
        <mat-icon class="text-gray-600">menu</mat-icon>
      </button>

      <div class="flex items-center cursor-pointer group" routerLink="/dashboard">
        <div class="w-10 h-10 rounded-xl overflow-hidden shadow-lg group-hover:scale-105 transition-transform duration-300">
          <img src="assets/logo.png" alt="Neemus Logo" class="w-full h-full object-contain bg-white">
        </div>
        <div class="ml-3 hidden sm:block">
          <h1 class="text-sm font-extrabold text-gray-900 leading-tight tracking-tight">Neemus Software Solutions</h1>
          <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Asset Management</p>
        </div>
      </div>
    </div>

   

    <!-- Right Section: Actions & Profile -->
    <div class="flex items-center gap-3">
      <!-- Notifications -->
      <div class="relative p-2.5 hover:bg-gray-50 rounded-full cursor-pointer group transition-colors">
        <mat-icon class="text-gray-400 group-hover:text-gray-600">notifications</mat-icon>
        <span class="absolute top-2.5 right-2.5 w-2 h-2 bg-red-500 border-2 border-white rounded-full animate-pulse"></span>
      </div>

      <!-- Profile Dropdown -->
      <div class="relative" (click)="toggleProfile()">
        <div class="flex items-center gap-2 p-1 pl-1 pr-3 hover:bg-gray-50 rounded-full cursor-pointer transition-all border border-transparent hover:border-gray-100">
          <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-sky-400 to-indigo-500 flex items-center justify-center text-white font-bold text-sm shadow-sm">
            {{ userInitials }}
          </div>
          <mat-icon class="text-gray-400 text-lg hidden sm:block transition-transform duration-300" [class.rotate-180]="profileOpen">expand_more</mat-icon>
        </div>

        <!-- Profile Dropdown Menu -->
        <div *ngIf="profileOpen" 
             class="absolute top-full right-0 mt-3 w-56 bg-white border border-gray-100 rounded-2xl shadow-2xl shadow-gray-200/50 py-2 z-50 animate-in fade-in slide-in-from-top-2 duration-200">
           <a routerLink="/dashboard/profile" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors text-sm font-medium text-gray-700">
            <div class="p-2 bg-gray-100 rounded-lg"><mat-icon class="text-gray-500 text-lg">account_circle</mat-icon></div>
            My Profile
           </a>
           <a routerLink="/settings" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors text-sm font-medium text-gray-700">
            <div class="p-2 bg-gray-100 rounded-lg"><mat-icon class="text-gray-500 text-lg">settings</mat-icon></div>
            Settings
           </a>
           <div class="h-px bg-gray-100 my-2 mx-4"></div>
           <button (click)="logout()" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-red-50 transition-colors text-sm font-bold text-red-500 text-left">
            <div class="p-2 bg-red-100/50 rounded-lg"><mat-icon class="text-red-500 text-lg">logout</mat-icon></div>
            Logout
           </button>
        </div>
      </div>
    </div>

  </div>
</nav>
