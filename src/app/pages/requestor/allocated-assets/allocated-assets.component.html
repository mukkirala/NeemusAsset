<div class="min-h-screen bg-slate-50 p-8 flex flex-col gap-6 animate-in fade-in slide-in-from-bottom-3 duration-500">

  <!-- Page Header -->
  <header class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
    <div>
      <h1 class="text-3xl font-black text-slate-900 tracking-tight">Allocated Assets</h1>
      <p class="text-sm text-slate-500 font-medium mt-1">View and manage all assets allocated to you</p>
    </div>
  </header>

  <!-- Data Table Container -->
  <div class="bg-white border border-slate-200 rounded-[32px] shadow-xl overflow-hidden">
    <div *ngIf="data.length === 0" class="flex flex-col items-center justify-center py-24 text-center border-2 border-dashed border-slate-100 m-6 rounded-3xl">
      <div class="text-5xl mb-4 opacity-40">📦</div>
      <p class="text-xl font-black text-slate-900">No allocated assets found</p>
      <p class="text-slate-500 font-medium">Any assets assigned to you will appear here.</p>
    </div>

    <app-data-table
      *ngIf="data.length > 0"
      [data]="data"
      [columns]="columns"
      [title]="'Allocated Assets'"
      [pageSize]="10"
      [allowSelection]="true"
      [allowGrouping]="true"
      [height]="500"
    ></app-data-table>
  </div>

</div>
