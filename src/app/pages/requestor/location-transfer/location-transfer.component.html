<div class="min-h-screen bg-slate-50 p-8 flex flex-col items-center justify-center animate-in fade-in slide-in-from-bottom-3 duration-500">
  
  <div class="w-full max-w-2xl">
    <app-common-card 
      [title]="'Location Transfer'" 
      [subtitle]="'Request to transfer an asset to a new location'"
      [icon]="'location_on'"
      [buttonLabel]="'Send Request'"
      [disabled]="transferForm.invalid"
      (onAction)="onSubmit()">
      
      <!-- Form Content -->
      <form [formGroup]="transferForm" (ngSubmit)="onSubmit()" class="space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Asset Class -->
          <div class="flex flex-col gap-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Select Asset Class</label>
            <div class="relative">
              <select formControlName="assetClass" 
                      class="w-full h-12 px-4 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-slate-900 focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500 outline-none transition-all appearance-none cursor-pointer">
                <option value="" disabled selected>Choose a class</option>
                <option *ngFor="let class of assetClasses" [value]="class">{{ class }}</option>
              </select>
              <mat-icon class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</mat-icon>
            </div>
          </div>

          <!-- Asset -->
          <div class="flex flex-col gap-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Select Asset</label>
            <div class="relative">
              <select formControlName="asset" 
                      class="w-full h-12 px-4 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-slate-900 focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500 outline-none transition-all appearance-none cursor-pointer">
                <option value="" disabled selected>Choose an asset</option>
                <option *ngFor="let a of allocatedAssets" [value]="a.id">{{ a.name }}</option>
              </select>
              <mat-icon class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</mat-icon>
            </div>
          </div>
        </div>

        <!-- To Location -->
        <div class="flex flex-col gap-2">
          <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Select To Location</label>
          <div class="relative">
            <select formControlName="toLocation" 
                    class="w-full h-12 px-4 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-slate-900 focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500 outline-none transition-all appearance-none cursor-pointer">
              <option value="" disabled selected>Choose destination location</option>
              <option *ngFor="let loc of locations" [value]="loc">{{ loc }}</option>
            </select>
            <mat-icon class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</mat-icon>
          </div>
        </div>

        <!-- Comments -->
        <div class="flex flex-col gap-2">
          <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Comments / Remarks</label>
          <textarea formControlName="comments" placeholder="Provide any additional details..." rows="3"
                    class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-slate-900 placeholder:text-slate-400 focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500 outline-none transition-all resize-none"></textarea>
        </div>

        <!-- Hidden submit -->
        <button type="submit" class="hidden"></button>

      </form>

    </app-common-card>
  </div>

</div>
