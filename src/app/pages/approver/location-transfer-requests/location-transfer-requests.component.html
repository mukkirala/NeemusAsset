<div class="min-h-screen bg-slate-50 p-8 flex flex-col gap-10 animate-in fade-in slide-in-from-bottom-3 duration-500">

  <!-- Page Header -->
  <header>
    <h1 class="text-3xl font-black text-slate-900 tracking-tight">Location Transfer Management</h1>
    <p class="text-sm text-slate-500 font-medium mt-1">Review and approve location transfer requests</p>
  </header>

  <!-- Section 1: New Location Transfer Req List -->
  <section class="flex flex-col gap-4">
    <div class="flex items-center gap-3 ml-2">
      <div class="w-2 h-8 bg-sky-500 rounded-full"></div>
      <h2 class="text-xl font-black text-slate-800">New Location Transfer Req List</h2>
    </div>
    
    <div class="bg-white border border-slate-200 rounded-[32px] shadow-xl overflow-hidden">
      <app-data-table
        [data]="newRequestsData"
        [columns]="newRequestColumns"
        [title]="'New Transfer Requests'"
        [pageSize]="5"
        [allowSelection]="true"
        [height]="300"
      ></app-data-table>
    </div>
  </section>

  <!-- Section 2: Approved Location Transfer List -->
  <section class="flex flex-col gap-4">
    <div class="flex items-center gap-3 ml-2">
      <div class="w-2 h-8 bg-emerald-500 rounded-full"></div>
      <h2 class="text-xl font-black text-slate-800">Approved Location Transfers</h2>
    </div>

    <div class="bg-white border border-slate-200 rounded-[32px] shadow-xl overflow-hidden">
      <app-data-table
        [data]="approvedRequestsData"
        [columns]="approvedRequestColumns"
        [title]="'Approved Transfers'"
        [pageSize]="5"
        [allowSelection]="true"
        [height]="300"
      ></app-data-table>
    </div>
  </section>

</div>
