<div class="p-6 bg-slate-50 min-h-screen">
  <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
    <!-- Custom Header -->
    <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-gradient-to-r from-indigo-600 to-violet-600 text-white">
      <div>
        <h2 class="text-2xl font-bold">Assigned Roles List</h2>
        <p class="text-indigo-100 text-sm opacity-80">Manage system roles and custodian assignments</p>
      </div>
      <div class="flex gap-2">
         <mat-icon class="opacity-40 scale-150">shield</mat-icon>
      </div>
    </div>

    <div class="p-4">
      <ejs-grid 
        [dataSource]="data" 
        [allowPaging]="true" 
        [pageSettings]="pageSettings" 
        [toolbar]="toolbar"
        [allowSorting]="true"
        [allowFiltering]="true"
        gridLines="Horizontal"
        class="modern-grid"
      >
        <e-columns>
          <!-- Actions Column -->
          <e-column headerText="Actions" width="120" textAlign="Center">
            <ng-template #template let-data>
              <div class="flex items-center justify-center gap-2">
                <button mat-icon-button color="primary" (click)="editRole(data)" matTooltip="Edit Role">
                  <mat-icon class="text-indigo-600">edit</mat-icon>
                </button>
                <button mat-icon-button color="warn" (click)="deleteRole(data)" matTooltip="Delete Role">
                  <mat-icon class="text-rose-500">delete</mat-icon>
                </button>
              </div>
            </ng-template>
          </e-column>

          <e-column field="roleId" headerText="Role ID" width="120" textAlign="Left"></e-column>
          <e-column field="roleName" headerText="Role Name" width="180"></e-column>
          <e-column field="custId" headerText="Custodian ID" width="150"></e-column>
          <e-column field="createdDate" headerText="Created Date" width="150" format="yMd"></e-column>
          
          <e-column field="status" headerText="Status" width="120" textAlign="Center">
            <ng-template #template let-data>
              <div class="flex items-center justify-center">
                <span [class]="data.status === 'Active' ? 'status-pill active' : 'status-pill inactive'">
                  {{ data.status }}
                </span>
              </div>
            </ng-template>
          </e-column>
        </e-columns>
      </ejs-grid>
    </div>
  </div>
</div>
