<div class="location-container">

    <div class="header-section">
        <h1>Add Location</h1>
    </div>

    <div class="grid-card">

        <ejs-grid
            #grid
            [dataSource]="locationData"
            height="300"
            [toolbar]="toolbarOptions"
            [editSettings]="editSettings"
            allowPaging="true"
            (actionComplete)="actionComplete($event)">

            <e-columns>

                <e-column
                    field="Location"
                    headerText="Location Name"
                    width="180"
                    [validationRules]="{ required: true }">
                </e-column>

                <e-column
                    field="LocationCode"
                    headerText="Location Code"
                    width="150"
                    [validationRules]="{ required: true }">
                </e-column>

                <e-column
                    field="Block"
                    headerText="Block"
                    width="150"
                    [validationRules]="{ required: true }">
                </e-column>

            </e-columns>
<e-column
    headerText="Actions"
    width="120"
    [commands]="commands">

    </div>

</div>
