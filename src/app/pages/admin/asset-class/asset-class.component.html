<div class="p-6">
    <div class="bg-white/80 backdrop-blur-md rounded-xl shadow-xl border border-slate-200 overflow-hidden">
        <!-- Header -->
        <div
            class="p-6 border-b border-slate-100 flex items-center justify-between bg-gradient-to-r from-slate-50 to-white">
            <div>
                <h2 class="text-xl font-bold text-slate-800">Asset Class Details</h2>
           </div>
          
        </div>

        <div class="p-4">
            <ejs-grid #grid id="AssetGrid" [dataSource]='Assets' allowPaging='true' [pageSettings]='pageSettings'
                [editSettings]='editSettings' [toolbar]="toolbar" [allowSorting]='true' [allowFiltering]='true'
                [allowExcelExport]="true" [allowPdfExport]="true" (toolbarClick)="toolbarClick($event)"
                [allowRowDragAndDrop]="true" [allowGrouping]="true" [groupSettings]="groupSettings"
                [showColumnChooser]="true" [allowResizing]="true" [allowReordering]="true"
                [filterSettings]='filterSettings' (actionComplete)="actionComplete($event)" gridLines="Horizontal"
                class="border-none"  >
                <e-columns>
             
                     <e-column field='AssetClassID'  width='150' textAlign='Right' [visible]='false'
                        isPrimaryKey='true' [validationRules]='coderules'></e-column>
                    <e-column field='AssetClassName' headerText='Asset Class' width='150' textAlign='Left'
                        [validationRules]='coderules'></e-column>
                    <e-column field='AssetClassCode' headerText='Asset Code' width='250' textAlign='Left'
                        [validationRules]='namerules'></e-column>
                           <e-column field='Depreciation' headerText='Depreciation' width='250' textAlign='Left'
                        [validationRules]='namerules'></e-column>
                    <e-column field='Status' headerText='Status' width='150' textAlign='Left' [visible]='false'>
                        <ng-template #template let-data>
                            <span class="px-3 py-1 rounded-full text-xs font-bold"
                                [ngClass]="{
                                    'bg-emerald-100 text-emerald-700': data.Status === 'Active',
                                    'bg-rose-100 text-rose-700': data.Status !== 'Active'
                                }">
                                {{ data.Status }}
                            </span>
                        </ng-template>
                    </e-column>
                    <e-column headerText='Manage Records' width='160' [commands]='commands' [allowFiltering]="false" [allowSorting]="false" [allowGrouping]="false"></e-column>
                </e-columns>
            </ejs-grid>
        </div>
    </div>
</div>
