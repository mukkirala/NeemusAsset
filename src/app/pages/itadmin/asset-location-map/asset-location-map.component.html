<div class="min-h-screen bg-slate-50 p-8 flex flex-col gap-6 animate-in fade-in slide-in-from-bottom-3 duration-500">
  
  <header>
    <h1 class="text-3xl font-black text-slate-900 tracking-tight">Assets Location Details</h1>
    <p class="text-sm text-slate-500 font-medium mt-1">Geospatial data for tracking assets across facility locations</p>
  </header>

  <div class="bg-white border border-slate-200 rounded-[32px] shadow-xl overflow-hidden">
    <app-data-table
      [data]="data"
      [columns]="columns"
      title="Assets Details"
      [pageSize]="10"
      [allowSelection]="false"
      [allowGrouping]="true"
      [height]="460">
    </app-data-table>
  </div>

</div>
