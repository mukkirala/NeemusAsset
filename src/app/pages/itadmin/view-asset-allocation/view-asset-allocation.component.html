<div class="min-h-screen bg-slate-50 p-8 flex flex-col gap-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
  
  <header>
    <h1 class="text-3xl font-black text-slate-900 tracking-tight">View Allocation of Assets</h1>
    <p class="text-sm text-slate-500 font-medium mt-1">Detailed history of all approved and rejected asset allocation requests</p>
  </header>

  <!-- ── Approved Requested Assets Section ───────────── -->
  <section class="space-y-4">
    <div class="flex items-center justify-between">
      <h2 class="text-lg font-black text-slate-800 flex items-center gap-3">
        <span class="w-2 h-8 bg-emerald-500 rounded-full"></span>
        Approved Requested Assets
      </h2>
      <span class="px-4 py-1.5 bg-emerald-100 text-emerald-700 rounded-full text-xs font-black uppercase tracking-widest">
        Count: {{ approvedData.length }}
      </span>
    </div>
    <div class="bg-white border border-slate-200 rounded-[32px] shadow-xl overflow-hidden">
      <app-data-table
        [data]="approvedData"
        [columns]="approvedColumns"
        title="Approved Assets"
        [pageSize]="5"
        [height]="260"
        [allowGrouping]="true">
      </app-data-table>
    </div>
  </section>

  <!-- ── Rejected Requested Assets Section ───────────── -->
  <section class="space-y-4">
    <div class="flex items-center justify-between">
      <h2 class="text-lg font-black text-slate-800 flex items-center gap-3">
        <span class="w-2 h-8 bg-rose-500 rounded-full"></span>
        Rejected Requested Assets
      </h2>
      <span class="px-4 py-1.5 bg-rose-100 text-rose-700 rounded-full text-xs font-black uppercase tracking-widest">
        Count: {{ rejectedData.length }}
      </span>
    </div>
    <div class="bg-white border border-slate-200 rounded-[32px] shadow-xl overflow-hidden">
      <app-data-table
        [data]="rejectedData"
        [columns]="rejectedColumns"
        title="Rejected Assets"
        [pageSize]="5"
        [height]="260"
        [allowGrouping]="true">
      </app-data-table>
    </div>
  </section>

</div>
