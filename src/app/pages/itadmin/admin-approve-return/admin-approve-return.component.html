<div class="min-h-screen bg-slate-50 p-8 flex flex-col gap-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
  
  <header>
    <h1 class="text-3xl font-black text-slate-900 tracking-tight">Approve Asset Return</h1>
    <p class="text-sm text-slate-500 font-medium mt-1">Review and process asset return requests from employees</p>
  </header>

  <!-- ── View Asset Return Requests Section ───────────── -->
  <section class="space-y-4">
    <div class="flex items-center justify-between">
      <h2 class="text-lg font-black text-slate-800 flex items-center gap-3">
        <span class="w-2 h-8 bg-sky-500 rounded-full"></span>
        View Asset Return Requests
      </h2>
      <span class="px-4 py-1.5 bg-sky-100 text-sky-700 rounded-full text-xs font-black uppercase tracking-widest">
        Count: {{ requestedData.length }}
      </span>
    </div>
    <div class="bg-white border border-slate-200 rounded-[32px] shadow-xl overflow-hidden">
      <app-data-table
        [data]="requestedData"
        [columns]="requestedColumns"
        title="Pending Returns"
        [pageSize]="5"
        [height]="260"
        [allowGrouping]="true">
      </app-data-table>
    </div>
  </section>

  <!-- ── Approved Asset Return Requests Section ───────────── -->
  <section class="space-y-4">
    <div class="flex items-center justify-between">
      <h2 class="text-lg font-black text-slate-800 flex items-center gap-3">
        <span class="w-2 h-8 bg-emerald-500 rounded-full"></span>
        Approved Asset Return Requests
      </h2>
      <span class="px-4 py-1.5 bg-emerald-100 text-emerald-700 rounded-full text-xs font-black uppercase tracking-widest">
        Count: {{ approvedData.length }}
      </span>
    </div>
    <div class="bg-white border border-slate-200 rounded-[32px] shadow-xl overflow-hidden">
      <app-data-table
        [data]="approvedData"
        [columns]="approvedColumns"
        title="Approved History"
        [pageSize]="5"
        [height]="260"
        [allowGrouping]="true">
      </app-data-table>
    </div>
  </section>

</div>
