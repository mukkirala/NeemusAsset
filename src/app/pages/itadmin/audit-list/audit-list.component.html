<div class="p-6 space-y-6">

  <!-- Grid Card -->
  <div class="bg-white/80 backdrop-blur-md rounded-xl shadow-xl border border-slate-200 overflow-hidden">

    <!-- Grid Header -->
    <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-gradient-to-r from-slate-50 to-white">
      <div>
        <h2 class="text-xl font-bold text-slate-800">Audits List</h2>
        <p class="text-sm text-slate-500">
          {{ auditData.length }} audit{{ auditData.length === 1 ? '' : 's' }} &mdash; filter, view and export all records
        </p>
      </div>

      <!-- Quick Filter Dropdown -->
      <div class="flex items-center gap-3">
        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide whitespace-nowrap">
          Filter By
        </label>
        <select
          [(ngModel)]="filterType"
          (change)="onFilterChange()"
          class="px-4 py-2 rounded-lg border border-slate-200 bg-white text-sm font-medium
                 text-slate-700 shadow-sm focus:outline-none focus:border-emerald-400
                 focus:ring-2 focus:ring-emerald-100 transition-all cursor-pointer">
          <option value="All">All Audits</option>
          <option value="Current">Current Audits</option>
          <option value="Pending">Pending Audits</option>
          <option value="Completed">Completed Audits</option>
          <option value="Approved">Approved Audits</option>
          <option value="LocationWise">Location Wise</option>
        </select>
      </div>
    </div>

    <!-- Loading Spinner -->
    <div *ngIf="isLoading"
      class="flex items-center justify-center py-16 text-slate-400 text-sm font-medium">
      <svg class="animate-spin h-5 w-5 mr-3 text-emerald-500"
        xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10"
          stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
      </svg>
      Loading audit data...
    </div>

    <!-- Grid (render after data loads so all rows bind correctly) -->
    <div class="p-4" *ngIf="!isLoading">
      <ejs-grid
        #grid
        id="auditListGrid"
        [dataSource]="auditData"
        allowPaging="true"
        [pageSettings]="pageSettings"
        [allowSorting]="true"
        [allowFiltering]="true"
        [allowExcelExport]="true"
        [allowPdfExport]="true"
        [allowGrouping]="true"
        [groupSettings]="groupSettings"
        [showColumnChooser]="true"
        [allowResizing]="true"
        [allowReordering]="true"
        [filterSettings]="filterSettings"
        [toolbar]="toolbar"
        (toolbarClick)="toolbarClick($event)"
        gridLines="Horizontal"
        class="border-none">

        <e-columns>

          <e-column
            field="auditID"
            headerText="Audit ID"
            width="100"
            textAlign="Right"
            [visible]="false"
            isPrimaryKey="true">
          </e-column>

          <e-column
            field="auditName"
            headerText="Audit Name"
            width="180"
            textAlign="Left">
          </e-column>

          <e-column
            field="auditDescription"
            headerText="Audit Description"
            width="220"
            textAlign="Left">
          </e-column>

          <e-column
            field="createdBy"
            headerText="Created By"
            width="130"
            textAlign="Left">
          </e-column>

          <e-column
            field="locationCode"
            headerText="Location Code"
            width="140"
            textAlign="Left">
          </e-column>

          <e-column
            field="location"
            headerText="Location"
            width="180"
            textAlign="Left">
          </e-column>

          <e-column
            field="auditDateDisplay"
            headerText="Audit Date"
            width="140"
            textAlign="Left">
          </e-column>

          <e-column
            field="auditStatus"
            headerText="Audit Status"
            width="150"
            textAlign="Left">
            <ng-template #template let-data>
              <span
                class="px-3 py-1 rounded-full text-xs font-bold"
                [ngClass]="{
                  'bg-emerald-100 text-emerald-700': data.auditStatus === 'Active' || data.auditStatus === 'Approved' || data.auditStatus === 'Completed',
                  'bg-amber-100 text-amber-700': data.auditStatus === 'Pending' || data.auditStatus === 'In Progress',
                  'bg-rose-100 text-rose-700': data.auditStatus === 'Inactive' || data.auditStatus === 'InActive'
                }">
                {{ data.auditStatus }}
              </span>
            </ng-template>
          </e-column>

        </e-columns>
      </ejs-grid>
    </div>

  </div>
</div>
