<div class="min-h-screen bg-slate-50 p-8 flex flex-col gap-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
  
  <header>
    <h1 class="text-3xl font-black text-slate-900 tracking-tight">Asset Parking</h1>
    <p class="text-sm text-slate-500 font-medium mt-1">Allocate and park assets to custodians</p>
  </header>

  <!-- ── Form Section ───────────── -->
  <section class="bg-white border border-slate-200 rounded-[32px] shadow-xl p-8 space-y-8">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      
      <div class="space-y-6">
        <div class="flex flex-col gap-2">
          <label class="text-sm font-black text-slate-700 uppercase tracking-wider">Select Custodian</label>
          <div class="flex gap-2">
            <select class="flex-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-sky-100 focus:border-sky-500 outline-none transition-all font-medium text-slate-900">
              <option value="">Select Custodian</option>
            </select>
            <button class="p-3 bg-sky-500 text-white rounded-2xl shadow-lg shadow-sky-200 hover:bg-sky-600 transition-all">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
              </svg>
            </button>
          </div>
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-sm font-black text-slate-700 uppercase tracking-wider">Select Location</label>
          <select class="px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-sky-100 focus:border-sky-500 outline-none transition-all font-medium text-slate-900">
            <option value="">Select Location</option>
          </select>
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-sm font-black text-slate-700 uppercase tracking-wider">Select Asset Class</label>
          <select class="px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-sky-100 focus:border-sky-500 outline-none transition-all font-medium text-slate-900">
            <option value="">Select Asset Class</option>
          </select>
        </div>
      </div>

      <div class="space-y-6">
        <div class="flex flex-col gap-2">
          <label class="text-sm font-black text-slate-700 uppercase tracking-wider">Select Asset Type</label>
          <div class="flex gap-2">
            <select class="flex-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-sky-100 focus:border-sky-500 outline-none transition-all font-medium text-slate-900">
              <option value="">Select Asset Type</option>
            </select>
            <button class="p-3 bg-sky-500 text-white rounded-2xl shadow-lg shadow-sky-200 hover:bg-sky-600 transition-all">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
              </svg>
            </button>
          </div>
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-sm font-black text-slate-700 uppercase tracking-wider">Allocate Quantity</label>
          <input type="number" placeholder="Enter Quantity" class="px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-sky-100 focus:border-sky-500 outline-none transition-all font-medium text-slate-900">
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-sm font-black text-slate-700 uppercase tracking-wider">Remarks</label>
          <textarea rows="3" placeholder="Enter Remarks" class="px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-sky-100 focus:border-sky-500 outline-none transition-all font-medium text-slate-900 resize-none"></textarea>
        </div>
      </div>

    </div>
  </section>

  <!-- ── Asset Details Table ───────────── -->
  <section class="space-y-4">
    <h2 class="text-lg font-black text-slate-800 flex items-center gap-3 pl-4">
      <span class="w-2 h-8 bg-sky-500 rounded-full"></span>
      Asset Details
    </h2>
    <div class="bg-white border border-slate-200 rounded-[32px] shadow-xl overflow-hidden">
      <app-data-table
        [data]="detailsData"
        [columns]="detailsColumns"
        title="Available Assets"
        [pageSize]="5"
        [height]="240"
        [allowGrouping]="true">
      </app-data-table>
    </div>
    <div class="flex justify-end pr-4">
      <button (click)="onAdd()" class="px-8 py-3 bg-slate-900 text-white rounded-2xl font-black shadow-xl shadow-slate-200 hover:scale-105 transition-all active:scale-95">
        Add to Selection
      </button>
    </div>
  </section>

  <!-- ── Selection Table ───────────── -->
  <section class="space-y-4">
    <h2 class="text-lg font-black text-slate-800 flex items-center gap-3 pl-4">
      <span class="w-2 h-8 bg-emerald-500 rounded-full"></span>
      Selected for Parking
    </h2>
    <div class="bg-white border border-slate-200 rounded-[32px] shadow-xl overflow-hidden">
      <app-data-table
        [data]="selectedData"
        [columns]="selectedColumns"
        title="Parking Queue"
        [pageSize]="5"
        [height]="240"
        [allowGrouping]="true">
      </app-data-table>
    </div>
    <div class="flex justify-end pr-4">
      <button (click)="onPark()" class="px-10 py-4 bg-emerald-500 text-white rounded-2xl font-black shadow-xl shadow-emerald-100 hover:scale-105 hover:bg-emerald-600 transition-all active:scale-95">
        Park Assets
      </button>
    </div>
  </section>

</div>
