<div class="p-6 space-y-6 relative">

  <!-- Grid Card -->
  <div class="bg-white/80 backdrop-blur-md rounded-xl shadow-xl border border-slate-200 overflow-hidden">

    <!-- Grid Header -->
    <div class="p-6 border-b border-slate-100 bg-gradient-to-r from-slate-50 to-white">
      <h2 class="text-xl font-bold text-slate-800">Audit Completion</h2>
      <p class="text-sm text-slate-500">Mark active audits as completed and record final remarks</p>
    </div>

    <!-- Grid -->
    <div class="p-4">
      <ejs-grid
        #grid
        id="auditCompletionGrid"
        [dataSource]="completions"
        [allowPaging]="true"
        [pageSettings]="pageSettings"
        [editSettings]="editSettings"
        [allowSorting]="true"
        [allowFiltering]="true"
        [allowExcelExport]="true"
        [allowPdfExport]="true"
        [allowGrouping]="true"
        [groupSettings]="groupSettings"
        [showColumnChooser]="true"
        [allowResizing]="true"
        [allowReordering]="true"
        [filterSettings]="filterSettings"
        [toolbar]="toolbar"
        (toolbarClick)="toolbarClick($event)"
        (actionBegin)="actionBegin($event)"
        (actionComplete)="actionComplete($event)"
        gridLines="Horizontal"
        class="border-none">

        <e-columns>

          <e-column
            field="auditID"
            headerText="Audit ID"
            width="100"
            [visible]="false"
            isPrimaryKey="true">
          </e-column>

          <e-column
            field="auditName"
            headerText="Audit Name"
            width="180"
            textAlign="Left">
          </e-column>

          <e-column
            field="auditDescription"
            headerText="Description"
            width="220"
            textAlign="Left">
          </e-column>

          <e-column
            field="locationID"
            headerText="Location"
            width="150"
            textAlign="Left">
            <ng-template #template let-data>
              <span>{{ getLocationName(data.locationID) }}</span>
            </ng-template>
          </e-column>

          <e-column
            field="completionDate"
            headerText="Completion Date"
            width="160"
            textAlign="Left"
            type="date"
            format="dd-MMM-yyyy">
          </e-column>

          <e-column
            field="adminRemarks"
            headerText="Remarks"
            width="180"
            textAlign="Left">
          </e-column>

          <e-column
            field="auditStatus"
            headerText="Audit Status"
            width="140"
            textAlign="Left">
            <ng-template #template let-data>
              <span
                class="px-3 py-1 rounded-full text-xs font-bold"
                [ngClass]="{
                  'bg-emerald-100 text-emerald-700': data.auditStatus === 'Completed',
                  'bg-amber-100   text-amber-700':   data.auditStatus === 'Open' || data.auditStatus === 'In Progress',
                  'bg-slate-100   text-slate-600':   data.auditStatus !== 'Completed' &&
                                                     data.auditStatus !== 'Open' &&
                                                     data.auditStatus !== 'In Progress'
                }">
                {{ data.auditStatus }}
              </span>
            </ng-template>
          </e-column>

          <e-column
            field="status"
            headerText="Status"
            width="120"
            textAlign="Left">
            <ng-template #template let-data>
              <span
                class="px-3 py-1 rounded-full text-xs font-bold"
                [ngClass]="{
                  'bg-blue-100 text-blue-700': data.status === 'Active',
                  'bg-rose-100 text-rose-700': data.status === 'InActive'
                }">
                {{ data.status }}
              </span>
            </ng-template>
          </e-column>

        </e-columns>

        <!-- IMPORTANT: must be named exactly #editSettingsTemplate -->
        <ng-template #editSettingsTemplate let-data>
          <div class="p-2 space-y-5">

            <!-- Select Audit -->
            <div class="flex flex-col gap-1.5">
              <label class="text-xs font-semibold text-slate-600 uppercase tracking-wide">
                Select Audit <span class="text-rose-500">*</span>
              </label>
              <ejs-dropdownlist
                id="formAudit"
                [dataSource]="activeAuditData"
                [fields]="auditFields"
                [(ngModel)]="formAuditID"
                (change)="onAuditChange($event)"
                placeholder="Select an audit"
                [showClearButton]="true">
              </ejs-dropdownlist>
            </div>

            <!-- Completion Date -->
            <div class="flex flex-col gap-1.5">
              <label class="text-xs font-semibold text-slate-600 uppercase tracking-wide">
                Completion Date <span class="text-rose-500">*</span>
              </label>
              <ejs-datepicker
                id="formDate"
                [(ngModel)]="formCompletionDate"
                placeholder="Select date"
                format="dd-MMM-yyyy"
                [showClearButton]="true">
              </ejs-datepicker>
            </div>

            <!-- Admin Remarks -->
            <div class="flex flex-col gap-1.5">
              <label class="text-xs font-semibold text-slate-600 uppercase tracking-wide">
                Admin Remarks
              </label>
              <textarea
                [(ngModel)]="formAdminRemarks"
                rows="3"
                placeholder="Enter remarks..."
                class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm
                       text-slate-700 bg-white shadow-sm focus:outline-none
                       focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100
                       transition-all resize-none">
              </textarea>
            </div>

          </div>
        </ng-template>

      </ejs-grid>
    </div>

  </div>
</div>
