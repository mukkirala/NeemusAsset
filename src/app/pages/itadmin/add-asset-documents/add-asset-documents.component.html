<div class="min-h-screen bg-slate-50 p-8 flex flex-col gap-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
  
  <header>
    <h1 class="text-3xl font-black text-slate-900 tracking-tight">Add Asset Documents</h1>
    <p class="text-sm text-slate-500 font-medium mt-1">Upload and manage images and documents for assets</p>
  </header>

  <app-common-card 
    title="Document Management" 
    subtitle="Associate files with specific assets" 
    icon="description"
    [disabled]="true"> <!-- We use manual buttons below -->
    
    <div class="flex flex-col gap-10">
      
      <!-- ── Section: Asset Details ───────────────────── -->
      <section>
        <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
          <span class="w-1.5 h-1.5 bg-sky-500 rounded-full"></span>
          Asset Details
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="flex flex-col gap-2">
            <label class="text-xs font-bold text-slate-600 px-1">Select Asset <span class="text-rose-500 font-black">*</span></label>
            <div class="relative group">
              <select [(ngModel)]="selectedAssetId" 
                      class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-5 py-3.5 font-bold text-slate-700 appearance-none focus:border-sky-500 focus:bg-white outline-none transition-all cursor-pointer">
                <option value="" disabled>Choose an asset...</option>
                <option *ngFor="let asset of assets" [value]="asset.id">{{ asset.mainAssetNumber }} - {{ asset.assetDescription }}</option>
              </select>
              <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-4 h-4">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                </svg>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ── Section: Add Image ───────────────────────── -->
      <section>
        <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
          <span class="w-1.5 h-1.5 bg-indigo-500 rounded-full"></span>
          Add Image
        </h3>
        <div class="flex flex-col sm:flex-row gap-8 items-start">
          <div class="w-48 h-48 bg-slate-50 border-2 border-dashed border-slate-200 rounded-[24px] flex items-center justify-center overflow-hidden shrink-0">
            <img *ngIf="imagePreview" [src]="imagePreview" class="w-full h-full object-cover" />
            <div *ngIf="!imagePreview" class="flex flex-col items-center gap-2 text-slate-300">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-10 h-10">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6.75a1.5 1.5 0 00-1.5-1.5H3.75a1.5 1.5 0 00-1.5 1.5v12.75a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
              </svg>
              <span class="text-[10px] font-black uppercase tracking-widest">No Image</span>
            </div>
          </div>
          <div class="flex flex-col gap-4 w-full">
            <div class="flex flex-col gap-2">
              <label class="text-xs font-bold text-slate-600 px-1">Upload Image</label>
              <input type="file" (change)="onFileChange($event, 'image')" 
                     class="block w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-xs file:font-black file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition-all cursor-pointer" />
            </div>
          </div>
        </div>
      </section>

      <!-- ── Section: Add Documents ───────────────────── -->
      <section>
        <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
          <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>
          Add Documents
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 items-end">
          <div class="flex flex-col gap-2">
            <label class="text-xs font-bold text-slate-600 px-1">Document Type <span class="text-rose-500 font-black">*</span></label>
            <div class="relative group">
              <select [(ngModel)]="documentType"
                      class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-5 py-3.5 font-bold text-slate-700 appearance-none focus:border-sky-500 focus:bg-white outline-none transition-all cursor-pointer">
                <option value="" disabled>Select type...</option>
                <option *ngFor="let type of documentTypes" [value]="type">{{ type }}</option>
              </select>
              <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-4 h-4">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                </svg>
              </div>
            </div>
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-xs font-bold text-slate-600 px-1">Upload Documents <span class="text-rose-500 font-black">*</span></label>
            <input type="file" (change)="onFileChange($event, 'doc')"
                   class="block w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-xs file:font-black file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 transition-all cursor-pointer" />
          </div>
          <div>
            <app-button label="Add" variant="primary" (btnClick)="onAddDocument()"></app-button>
          </div>
        </div>
      </section>

      <!-- ── Section: Documents List ──────────────────── -->
      <section>
        <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
          <span class="w-1.5 h-1.5 bg-amber-500 rounded-full"></span>
          Documents List
        </h3>
        <div class="border border-slate-100 rounded-[28px] overflow-hidden shadow-inner bg-slate-50/50">
          <app-data-table
            [data]="documentsList"
            [columns]="columns"
            title="Documents List"
            [pageSize]="5"
            [height]="200"
            [allowSelection]="false">
          </app-data-table>
        </div>
      </section>

      <!-- Footer Action -->
      <div class="flex justify-end pt-4 border-t border-slate-100">
        <div class="w-48">
          <app-button label="Save All" variant="primary" (btnClick)="onSave()"></app-button>
        </div>
      </div>

    </div>
  </app-common-card>

</div>
