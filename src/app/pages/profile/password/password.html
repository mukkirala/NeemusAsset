<div class="w-full bg-white rounded-3xl shadow-xl overflow-hidden animate-in fade-in duration-500 border border-slate-100">
  
  <!-- Peach Gradient Header -->
  <header class="bg-gradient-to-r from-[#fee2e2] via-[#ffedd5] to-[#fed7aa] py-6 flex items-center justify-center gap-2 border-b border-orange-100/50">
    <mat-icon class="text-slate-900">lock</mat-icon>
    <h2 class="text-xl font-bold text-slate-900">Change Password</h2>
  </header>

  <div class="p-12 sm:p-16 space-y-10">
    
    <!-- Current Password -->
    <div class="w-full space-y-2">
      <label class="block text-sm font-bold text-slate-800 ml-1">
        Current Password<span class="text-red-500">*</span>
      </label>
      <div class="relative">
        <input [type]="showPasswords.current ? 'text' : 'password'" 
               [(ngModel)]="passwords.current" 
               placeholder="Please Enter Current Password"
               class="w-full px-6 py-3.5 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-900 outline-none focus:border-sky-500 transition-all">
        <button type="button" (click)="toggleVisibility('current')"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-sky-500">
          <mat-icon class="text-lg">{{ showPasswords.current ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>
    </div>

    <!-- New Password -->
    <div class="w-full space-y-2">
      <label class="block text-sm font-bold text-slate-800 ml-1">
        New Password<span class="text-red-500">*</span>
      </label>
      <div class="relative">
        <input [type]="showPasswords.new ? 'text' : 'password'" 
               [(ngModel)]="passwords.new" 
               placeholder="Please Enter New Password"
               class="w-full px-6 py-3.5 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-900 outline-none focus:border-sky-500 transition-all">
        <button type="button" (click)="toggleVisibility('new')"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-sky-500">
          <mat-icon class="text-lg">{{ showPasswords.new ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>
    </div>

    <!-- Confirm Password -->
    <div class="w-full space-y-2">
      <label class="block text-sm font-bold text-slate-800 ml-1">
        Confirm New Password<span class="text-red-500">*</span>
      </label>
      <div class="relative">
        <input [type]="showPasswords.confirm ? 'text' : 'password'" 
               [(ngModel)]="passwords.confirm" 
               placeholder="Please Confirm New Password"
               class="w-full px-6 py-3.5 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-900 outline-none focus:border-sky-500 transition-all">
        <button type="button" (click)="toggleVisibility('confirm')"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-sky-500">
          <mat-icon class="text-lg">{{ showPasswords.confirm ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>
    </div>

    <!-- Center Button -->
    <div class="flex justify-center pt-6">
      <app-button label="Update Password" variant="green" [disabled]="!passwords.new || passwords.new !== passwords.confirm" (btnClick)="onSave()" class="px-10 py-3.5 rounded-xl font-bold"></app-button>

<app-button label="Cancel" variant="ash" (btnClick)="onClose()" class="text-xs font-bold text-white transition-colors uppercase tracking-widest"></app-button>

  </div>
</div>
