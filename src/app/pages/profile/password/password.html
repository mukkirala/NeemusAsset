<div class="bg-white rounded-[32px] overflow-hidden shadow-2xl border border-gray-100">
  <!-- Header -->
  <header class="p-8 bg-gradient-to-tr from-sky-500 to-indigo-600 text-white relative">
    <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-10 -mt-10 blur-2xl"></div>
    <div class="relative z-10 space-y-2">
      <h2 class="text-2xl font-black tracking-tight">Change Password</h2>
      <p class="text-sm opacity-90">Update your account security credentials.</p>
    </div>
  </header>

  <!-- Content -->
  <div class="p-8 space-y-6">
    <!-- Current Password -->
    <div class="space-y-2">
      <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest pl-1">Current Password</label>
      <div class="relative">
        <mat-icon class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300">lock</mat-icon>
        <input [type]="showPasswords.current ? 'text' : 'password'" 
               [(ngModel)]="passwords.current" 
               placeholder="Enter current password"
               class="w-full pl-12 pr-12 py-3.5 bg-gray-50 border border-gray-100 rounded-2xl text-sm focus:ring-4 focus:ring-sky-500/10 outline-none transition-all shadow-sm">
        <button type="button" (click)="toggleVisibility('current')"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-sky-500 transition-colors">
          <mat-icon class="text-lg">{{ showPasswords.current ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>
    </div>

    <!-- New Password -->
    <div class="space-y-2">
      <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest pl-1">New Password</label>
      <div class="relative">
        <mat-icon class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300">key</mat-icon>
        <input [type]="showPasswords.new ? 'text' : 'password'" 
               [(ngModel)]="passwords.new" 
               placeholder="Enter new password"
               class="w-full pl-12 pr-12 py-3.5 bg-gray-50 border border-gray-100 rounded-2xl text-sm focus:ring-4 focus:ring-sky-500/10 outline-none transition-all shadow-sm">
        <button type="button" (click)="toggleVisibility('new')"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-sky-500 transition-colors">
          <mat-icon class="text-lg">{{ showPasswords.new ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>
    </div>

    <!-- Confirm Password -->
    <div class="space-y-2">
      <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest pl-1">Confirm New Password</label>
      <div class="relative">
        <mat-icon class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300">history</mat-icon>
        <input [type]="showPasswords.confirm ? 'text' : 'password'" 
               [(ngModel)]="passwords.confirm" 
               placeholder="Confirm new password"
               class="w-full pl-12 pr-12 py-3.5 bg-gray-50 border border-gray-100 rounded-2xl text-sm focus:ring-4 focus:ring-sky-500/10 outline-none transition-all shadow-sm">
        <button type="button" (click)="toggleVisibility('confirm')"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-sky-500 transition-colors">
          <mat-icon class="text-lg">{{ showPasswords.confirm ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>
    </div>

    <!-- Security Warning -->
    <div class="flex items-start gap-3 p-4 bg-amber-50 rounded-2xl border border-amber-100">
      <mat-icon class="text-amber-500 text-sm mt-0.5">info</mat-icon>
      <p class="text-[11px] text-amber-700 font-medium leading-relaxed">
        Password must be at least 8 characters long and include numbers for enhanced account security.
      </p>
    </div>
  </div>

  <!-- Actions -->
  <footer class="p-8 bg-gray-50 flex items-center gap-4">
    <button (click)="onClose()" 
            class="flex-1 py-4 bg-white border border-gray-100 rounded-2xl text-sm font-bold text-gray-500 hover:bg-gray-100 transition-all shadow-sm">
      Cancel
    </button>
    <button (click)="onSave()" 
            [disabled]="!passwords.new || passwords.new !== passwords.confirm"
            class="flex-[2] py-4 bg-gradient-to-r from-sky-500 to-indigo-600 text-white rounded-2xl text-sm font-bold shadow-lg shadow-sky-200 transition-all hover:opacity-90 disabled:opacity-50 disabled:shadow-none active:scale-95">
      Update Password
    </button>
  </footer>
</div>
